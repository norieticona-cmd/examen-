{% extends "base.html" %}

{% block content %}

<h2>Crear Cliente</h2>

<form method="POST">

    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Teléfono</label>
        <input type="text" name="telefono" class="form-control" required>
    </div>

    <button class="btn btn-success">Guardar</button>
</form>

{% endblock %}
